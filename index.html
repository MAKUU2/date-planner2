<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Planner</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* mas flexible kaysa fixed height */
        background: #fff5f8;
        font-family: Arial, sans-serif;
        margin: 0;
      }

      .card {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        width: 90%;
        max-width: 600px;
        margin: auto;
        animation: fadeIn 0.5s ease-in-out;
      }

      .card h2 {
        font-size: 40px;
        color: #ff3f86;
        margin-bottom: 10px;
      }

      .card p {
        font-size: 18px;
        color: #555;
        margin-bottom: 20px;
      }

      button {
        padding: 15px 35px;
        font-size: 20px;
        border: none;
        border-radius: 50px;
        background: #ff3f86;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #ff1f70;
        transform: scale(1.05);
      }

      #noBtn {
        background: white;
        color: #333;
        border: 2px solid #ccc;
      }

      .buttons {
        display: flex;
        justify-content: center;
        gap: 20px; /* spacing sa pagitan ng Yes/No */
      }

      select,
      input {
        margin: 10px;
        padding: 10px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #ccc;
        width: 80%;
        max-width: 400px;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }

      .option {
        background: #fff5f8;
        border-radius: 15px;
        padding: 20px;
        cursor: pointer;
        transition: 0.3s;
      }

      .option:hover {
        background: #ffebf2;
        transform: scale(1.05);
      }

      .option.selected {
        background: #ff3f86;
        color: white;
        font-weight: bold;
        transform: scale(1.1);
      }

      .card img {
        width: 100%;
        max-width: 250px;
        height: auto;
        margin-bottom: 15px;
      }

      @media (max-width: 480px) {
        .card h2 {
          font-size: 28px;
        }
        .card p {
          font-size: 16px;
        }
        button {
          font-size: 18px;
          padding: 12px 25px;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container" id="mainContainer">
      <div class="card">
        <h2>Will you go on a date with me?</h2>
        <div class="buttons">
          <button id="yesBtn">Yes 💖</button>
          <button id="noBtn">No</button>
        </div>
      </div>
    </div>
    <script>
      const noBtn = document.getElementById('noBtn');
      const yesBtn = document.getElementById('yesBtn');
      const mainContainer = document.getElementById('mainContainer');

      noBtn.addEventListener('mouseover', () => {
        const x = Math.random() * 300 - 150;
        const y = Math.random() * 300 - 150;
        noBtn.style.transform = `translate(${x}px, ${y}px)`;
      });

      yesBtn.onclick = () => {
        mainContainer.innerHTML = `
          <div class="card">
            <h2>no way. NO WAY. 😳</h2>
            <p>i had a whole speech prepared for if you said no</p>
            <img src="cat.jpg" alt="Surprise Image" 
                 style="width:60%; max-width:250px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.2);" />
            <br>
            <button id="nextBtn">okay okay! →</button>
          </div>
        `;
        document.getElementById('nextBtn').onclick = () => {
          mainContainer.innerHTML = `
            <div class="card">
              <h2>So... when are you free?</h2>
              <p>Pick a Day ✨</p>
              <input type="date" id="dateInput"/>
              <br>
              <label>What Time?</label>
              <select id="timeSelect">
                <option value="">-- Select time --</option>
                <option>12:00 PM — lunch with the early birds</option>
                <option>1:00 PM — classic lunch time</option>
                <option>2:00 PM — post-lunch chill</option>
                <option>3:00 PM — afternoon snack vibes</option>
                <option>4:00 PM — early dinner crew</option>
              </select>
              <br>
              <button id="foodBtn">okay next →</button>
            </div>
          `;
          document.getElementById('foodBtn').onclick = () => {
            const chosenDate = document.getElementById('dateInput').value;
            const chosenTime = document.getElementById('timeSelect').value;
            if (!chosenDate || !chosenTime) {
              alert('✨ Please select both a date and time before continuing!');
              return;
            }
            mainContainer.innerHTML = `
              <div class="card">
                <h2>What are we feeling?</h2>
                <p>(you can pick more than one btw)</p>
                <div class="options">
                  <div class="option">🍕<br>Pizza</div>
                  <div class="option">🍣<br>Sushi</div>
                  <div class="option">🍔<br>Burgers</div>
                  <div class="option">🍝<br>Pasta</div>
                  <div class="option">🍵<br>Matcha Ice</div>
                  <div class="option">🍜<br>Ramen</div>
                </div>
                <label style="font-size:18px; color:#555;">📍 Where should we go?</label>
                <input type="text" id="locationInput" placeholder="Enter location (e.g. Cafe, Park)" style="width:80%; margin:10px;"/>
                <br>
                <button id="finalBtn">this one! →</button>
              </div>
            `;
            const options = document.querySelectorAll('.option');
            options.forEach((opt) => {
              opt.addEventListener('click', () => {
                opt.classList.toggle('selected');
              });
            });
            document.getElementById('finalBtn').onclick = () => {
              const selectedFoods = Array.from(
                document.querySelectorAll('.option.selected'),
              ).map((opt) => opt.innerText.split('\n')[1]);
              if (selectedFoods.length === 0) {
                alert('🍴 Please select at least one option!');
                return;
              }
              const hasMatcha = selectedFoods.includes('Matcha Ice');
              const foodsOnly = selectedFoods.filter((f) => f !== 'Matcha Ice');
              const chosenLocation =
                document.getElementById('locationInput').value;
              if (!chosenLocation) {
                alert('📍 Please enter a location!');
                return;
              }
              mainContainer.innerHTML = `
                <div class="card">
                  <h2>It’s a date! ❤️</h2>
                  <p>${chosenTime}, got it. bringing snacks just in case 🍿</p>
                  <h3 style="color:#ff3f86;">WHEN</h3>
                  <p>${new Date(chosenDate).toDateString()} at ${chosenTime}</p>
                  ${foodsOnly.length ? `<h3 style="color:#ff3f86;">FOOD</h3><p>${foodsOnly.join(', ')}</p>` : ''}
                  ${hasMatcha ? `<h3 style="color:#ff3f86;">DRINK</h3><p>Matcha Ice</p>` : ''}
                  <h3 style="color:#ff3f86;">LOCATION</h3>
                  <p>${chosenLocation}</p>
                  <button id="copyBtn">Copy plan & text me</button>
                </div>
              `;
              document.getElementById('copyBtn').onclick = () => {
                let plan =
                  'It’s a date! ❤️\n' +
                  new Date(chosenDate).toDateString() +
                  ' at ' +
                  chosenTime;
                if (foodsOnly.length) plan += '\nFood: ' + foodsOnly.join(', ');
                if (hasMatcha) plan += '\nDrink: Matcha Ice';
                plan += '\nLocation: ' + chosenLocation;
                navigator.clipboard.writeText(plan).then(() => {
                  alert('✅ Plan copied! Paste it in your text 💌');
                });
              };
            };
          };
        };
      };
    </script>
  </body>
</html>
